<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Intelligence — SEO Maxim's Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0b0e15;
  --surface: #111620;
  --surface2: #181e2c;
  --border: rgba(255,255,255,0.07);
  --accent: #cc1418;
  --teal: #3aacac;
  --text: #eef0f4;
  --muted: #4e5a70;
  --muted2: #7a8899;
  --danger: #ff4d6d;
  --navy: #0d1520;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(58,172,172,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(58,172,172,0.025) 1px, transparent 1px);
  background-size: 52px 52px;
  pointer-events:none; z-index:0;
}

/* ─── LOADING SCREEN ─── */
#loadingScreen {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
}
.loader-logo { opacity: 0.9; }
.loader-bar-wrap {
  width: 260px; height: 3px;
  background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden;
}
.loader-bar {
  height: 100%; background: var(--accent); border-radius: 2px;
  width: 0%; transition: width 0.4s ease;
}
.loader-text {
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted2);
  letter-spacing: 1px;
}
.loader-status {
  font-size: 11px; color: var(--muted); text-align: center; max-width: 300px;
}

/* ─── HEADER ─── */
header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 62px;
  background: var(--navy);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
}
.logo-area { display:flex; align-items:center; gap:20px; }
.header-divider { width:1px; height:28px; background:rgba(255,255,255,0.1); }
.dashboard-title-main {
  font-family:'Bebas Neue',sans-serif; font-size:18px;
  letter-spacing:2.5px; color:var(--text); line-height:1;
}
.dashboard-title-sub { font-size:10px; color:var(--teal); letter-spacing:1.5px; text-transform:uppercase; margin-top:2px; }

.header-right { display:flex; align-items:center; gap:12px; }
.live-pill {
  display:flex; align-items:center; gap:7px;
  background:var(--surface2); border:1px solid var(--border);
  padding:5px 12px; border-radius:20px;
  font-family:'DM Mono',monospace; font-size:10px; color:var(--muted2);
}
.live-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--teal); animation:pulse 2s infinite;
}
.live-dot.red { background: var(--accent); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

.btn {
  padding:8px 16px; border-radius:6px; border:none; cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600;
  transition:all 0.18s; white-space:nowrap;
}
.btn-teal { background:var(--teal); color:#fff; }
.btn-teal:hover { background:#2e9090; transform:translateY(-1px); }
.btn-red { background:var(--accent); color:#fff; }
.btn-red:hover { background:#a80f12; transform:translateY(-1px); }
.btn-ghost { background:transparent; color:var(--muted2); border:1px solid var(--border); }
.btn-ghost:hover { color:var(--text); border-color:rgba(255,255,255,0.2); }

/* ─── TABS BAR ─── */
.tabs-bar {
  position:sticky; top:62px; z-index:99;
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:stretch; overflow-x:auto; scrollbar-width:none;
}
.tabs-bar::-webkit-scrollbar { display:none; }
.tab-item {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:0 20px; min-height:52px; min-width:110px;
  cursor:pointer; border-bottom:3px solid transparent;
  transition:all 0.18s; position:relative; white-space:nowrap; user-select:none; gap:2px;
}
.tab-item:hover { background:rgba(255,255,255,0.03); }
.tab-item.active { border-bottom-color:var(--accent); background:rgba(204,20,24,0.05); }
.tab-item.loading-tab { opacity:0.5; pointer-events:none; }
.tab-flag { font-size:17px; line-height:1; }
.tab-name { font-size:11px; font-weight:600; letter-spacing:0.4px; color:var(--muted2); transition:color 0.18s; }
.tab-item.active .tab-name, .tab-item:hover .tab-name { color:var(--text); }
.tab-status {
  position:absolute; top:7px; right:8px;
  font-size:8px; padding:1px 5px; border-radius:6px;
  font-family:'DM Mono',monospace; border:1px solid var(--border);
  background:var(--surface2); color:var(--muted);
}
.tab-item.active .tab-status { background:var(--accent); color:#fff; border-color:var(--accent); }
.tab-status.ok { color: var(--teal); border-color: rgba(58,172,172,0.3); }
.tab-status.err { color: var(--danger); border-color: rgba(255,77,109,0.3); }

/* ─── CONTROLS ─── */
.controls-bar {
  position:relative; z-index:9;
  background:rgba(17,22,32,0.97);
  border-bottom:1px solid var(--border);
  padding:10px 32px;
  display:flex; flex-wrap:wrap; gap:14px; align-items:flex-end;
}
.ctrl-group { display:flex; flex-direction:column; gap:5px; }
.ctrl-label { font-size:9px; text-transform:uppercase; letter-spacing:1.8px; color:var(--muted); }
select {
  background:var(--surface2); border:1px solid var(--border);
  color:var(--text); padding:6px 10px; border-radius:6px;
  font-family:'DM Sans',sans-serif; font-size:12px; cursor:pointer; outline:none;
  transition:border-color 0.2s;
}
select:focus { border-color:var(--teal); }
select option { background:#181e2c; }

.query-tags { display:flex; flex-wrap:wrap; gap:5px; align-items:center; max-width:600px; }
.query-tag {
  display:flex; align-items:center; gap:4px;
  padding:3px 8px 3px 9px; border-radius:20px;
  font-size:11px; font-weight:500; border:1px solid;
  cursor:pointer; transition:all 0.15s; user-select:none;
}
.query-tag .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.query-tag .rm { opacity:0.4; font-size:12px; margin-left:1px; }
.query-tag:hover .rm { opacity:1; }
.query-tag.inactive { opacity:0.2; }
.type-toggle {
  display:flex; align-items:center; gap:6px;
  font-size:11px; color:var(--muted2); margin-left:8px;
  padding: 3px 10px; border-radius:20px;
  background:var(--surface2); border:1px solid var(--border);
  cursor:pointer; user-select:none; transition:all 0.15s;
}
.type-toggle.active-brand { border-color:rgba(58,172,172,0.4); color:var(--teal); }
.type-toggle.active-generic { border-color:rgba(232,160,32,0.4); color:#e8a020; }

/* ─── MAIN ─── */
main {
  position:relative; z-index:1;
  padding:18px 32px;
  display:grid;
  grid-template-columns: 1fr 1fr 1fr 290px;
  gap:14px;
}

/* ─── CARDS ─── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; overflow:hidden; transition:border-color 0.2s;
}
.card:hover { border-color:rgba(255,255,255,0.11); }
.card-header {
  padding:13px 18px 10px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.card-title { font-size:10px; text-transform:uppercase; letter-spacing:1.8px; color:var(--muted2); }
.card-body { padding:16px; }

/* ─── KPI ─── */
.kpi-row { grid-column:1/4; display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
.kpi {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:15px 17px; position:relative; overflow:hidden;
  transition:transform 0.2s, box-shadow 0.2s;
}
.kpi:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.3); }
.kpi::after {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:var(--kpi-color, var(--teal));
}
.kpi-label { font-size:9px; text-transform:uppercase; letter-spacing:1.8px; color:var(--muted); margin-bottom:6px; }
.kpi-value { font-family:'Bebas Neue',sans-serif; font-size:38px; line-height:1; }
.kpi-brand { font-size:11px; margin-top:3px; font-weight:500; }
.kpi-change {
  position:absolute; top:13px; right:13px;
  font-size:11px; font-weight:700; padding:2px 6px; border-radius:4px;
  font-family:'DM Mono',monospace;
}
.kpi-change.up { background:rgba(58,172,172,0.15); color:var(--teal); }
.kpi-change.down { background:rgba(204,20,24,0.12); color:#ff6b6b; }

/* ─── CHART ─── */
.main-chart-card { grid-column:1/4; }
.chart-wrap { padding:16px; height:270px; position:relative; }

/* ─── SIDEBAR ─── */
.sidebar { grid-column:4; grid-row:2/6; display:flex; flex-direction:column; gap:14px; }
.rank-list { display:flex; flex-direction:column; gap:5px; }
.rank-item {
  display:flex; align-items:center; gap:8px;
  padding:8px 10px; border-radius:8px;
  background:var(--surface2); border:1px solid transparent;
  transition:all 0.15s; cursor:pointer;
}
.rank-item:hover { border-color:var(--border); transform:translateX(2px); }
.rank-num { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); width:14px; }
.rank-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.rank-name { flex:1; font-size:12px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rank-bar-wrap { width:44px; height:3px; background:rgba(255,255,255,0.05); border-radius:2px; overflow:hidden; }
.rank-bar { height:100%; border-radius:2px; transition:width 0.6s cubic-bezier(0.4,0,0.2,1); }
.rank-score { font-family:'Bebas Neue',sans-serif; font-size:18px; }
.rank-type { font-size:8px; color:var(--muted); font-family:'DM Mono',monospace; width:40px; text-align:right; }

/* ─── HEATMAP ─── */
.heatmap-card { grid-column:1/3; }
.heatmap-grid {
  display:grid; gap:3px;
  font-family:'DM Mono',monospace; font-size:9px;
}
.hm-label { color:var(--muted2); display:flex; align-items:center; padding-right:3px; overflow:hidden; }
.hm-label span { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:9px; }
.hm-month { color:var(--muted); text-align:center; padding-bottom:3px; font-size:9px; }
.hm-cell { height:18px; border-radius:3px; cursor:pointer; transition:transform 0.12s; }
.hm-cell:hover { transform:scale(1.5); z-index:5; position:relative; }

/* ─── COMPARE TABLE ─── */
.compare-card { grid-column:3; }
.cmp-table { width:100%; border-collapse:collapse; }
.cmp-table th {
  font-size:8px; text-transform:uppercase; letter-spacing:1.2px; color:var(--muted);
  text-align:left; padding:5px 7px; border-bottom:1px solid var(--border);
}
.cmp-table td { padding:6px 7px; font-size:11px; border-bottom:1px solid rgba(255,255,255,0.02); }
.cmp-table tr:last-child td { border-bottom:none; }
.cmp-table tr:hover td { background:rgba(255,255,255,0.02); }
.cmp-badge {
  display:inline-block; padding:1px 5px; border-radius:3px;
  font-size:10px; font-weight:700; font-family:'DM Mono',monospace;
}

/* ─── NO DATA STATE ─── */
.no-data-state {
  grid-column:1/-1;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:60px 20px; gap:16px; text-align:center;
}
.no-data-icon { font-size:48px; opacity:0.3; }
.no-data-title { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:2px; color:var(--muted2); }
.no-data-desc { font-size:13px; color:var(--muted); max-width:400px; line-height:1.7; }

/* ─── DONUT ─── */
#donutChart { max-height:140px; }
.donut-legend { margin-top:10px; display:flex; flex-wrap:wrap; gap:5px; }
.donut-legend-item { display:flex; align-items:center; gap:4px; font-size:10px; color:var(--muted2); }

/* ─── FADEINS ─── */
.fadeIn { animation:fadeIn 0.4s ease both; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:3px; }

/* ─── TOAST ─── */
.toast {
  position:fixed; bottom:24px; right:24px; z-index:500;
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:12px 18px;
  font-size:12px; color:var(--text);
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  display:flex; align-items:center; gap:10px;
  animation:slideUp 0.3s ease;
  max-width:320px;
}
@keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
.toast.hide { animation:slideDown 0.3s ease forwards; }
@keyframes slideDown { to{opacity:0;transform:translateY(16px)} }

/* ─── RESPONSIVE ─── */
@media (max-width:1100px) {
  main { grid-template-columns:1fr 1fr; }
  .kpi-row { grid-column:1/3; grid-template-columns:repeat(2,1fr); }
  .main-chart-card { grid-column:1/3; }
  .sidebar { grid-column:1/3; grid-row:auto; flex-direction:row; flex-wrap:wrap; }
  .heatmap-card { grid-column:1/2; }
  .compare-card { grid-column:2; }
}
@media (max-width:700px) {
  main { grid-template-columns:1fr; padding:10px; }
  header { padding:0 16px; }
  .controls-bar { padding:10px 16px; }
  .kpi-row,.main-chart-card,.sidebar,.heatmap-card,.compare-card { grid-column:1; }
}
</style>
</head>

    <div class="live-pill">
      <span class="live-dot" id="liveDot"></span>
      <span id="lastUpdated">Loading...</span>

<!-- ═══ TABS ═══ -->
<div class="tabs-bar" id="tabsBar"></div>

<!-- ═══ CONTROLS ═══ -->
<div class="controls-bar">
  <div class="ctrl-group">
    <div class="ctrl-label">Period</div>
    <select id="periodSelect" onchange="onControlChange()">
      <option value="12" selected>Last 12 Months</option>
      <option value="6">Last 6 Months</option>
      <option value="3">Last 3 Months</option>
    </select>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">Chart Type</div>
    <select id="chartTypeSelect" onchange="renderMainChart()">
      <option value="line">Line</option>
      <option value="bar">Bar</option>
      <option value="area">Area</option>
    </select>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">Smoothing</div>
    <select id="smoothSelect" onchange="renderMainChart()">
      <option value="1" selected>Smoothed</option>
      <option value="0">Raw</option>
    </select>
  </div>
  <div class="ctrl-group" style="margin-left:auto">
    <div class="ctrl-label">Toggle Brands / Trends</div>
    <div class="query-tags" id="queryTags"></div>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<main id="mainGrid">
  <div class="no-data-state">
    <div class="no-data-icon">📡</div>
    <div class="no-data-title">Loading Data</div>
    <div class="no-data-desc">Fetching from Google Sheets...</div>
  </div>
</main>

<script>
// ═══════════════════════════════════════════════════════════
// ▼▼▼  CONFIG — PASTE YOUR SHEET ID HERE  ▼▼▼
// ═══════════════════════════════════════════════════════════
const SHEET_ID = "1CkCZeWpfzaFAhVDxqqK7qqrWj28ZXP3IhqKkX6Udefg";
// ═══════════════════════════════════════════════════════════

const COLORS = [
  '#cc1418','#3aacac','#e8a020','#7b8cde',
  '#e05c8a','#50c878','#f0a060','#a0c8f0',
  '#ff8c42','#c9e265','#9b5de5','#00bbf9'
];

const TABS_CONFIG = [
  { id:'CA-Ontario', flag:'🇨🇦', name:'Ontario',  sheetTab:'CA-Ontario' },
  { id:'CA-All',     flag:'🇨🇦', name:'Canada',   sheetTab:'CA-All'     },
  { id:'Greece',     flag:'🇬🇷', name:'Greece',   sheetTab:'Greece'     },
  { id:'Mexico',     flag:'🇲🇽', name:'Mexico',   sheetTab:'Mexico'     },
  { id:'Sweden',     flag:'🇸🇪', name:'Sweden',   sheetTab:'Sweden'     },
  { id:'Denmark',    flag:'🇩🇰', name:'Denmark',  sheetTab:'Denmark'    },
  { id:'Spain',      flag:'🇪🇸', name:'Spain',    sheetTab:'Spain'      },
  { id:'Romania',    flag:'🇷🇴', name:'Romania',  sheetTab:'Romania'    },
  { id:'Italy',      flag:'🇮🇹', name:'Italy',    sheetTab:'Italy'      },
];

// ── State ──
let activeTabId  = 'CA-Ontario';
let period       = 12;
let tabData      = {};   // { tabId: [ {date,keyword,interest,type,...} ] }
let tabStatus    = {};   // { tabId: 'ok' | 'loading' | 'error' | 'empty' }
let activeKws    = {};   // { tabId: Set }
let chartMain    = null;
let chartDonut   = null;
let showType     = 'brand'; // 'brand' | 'generic' | 'all'

// ── Chart.js defaults ──
Chart.defaults.color = '#4e5a70';
Chart.defaults.font.family = 'DM Sans';

// ═══════════════════════════════════════════════════════════
// GOOGLE SHEETS CSV FETCH
// ═══════════════════════════════════════════════════════════

function sheetCsvUrl(sheetTab) {
  const encoded = encodeURIComponent(sheetTab);
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encoded}`;
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim().toLowerCase());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = splitCSVLine(lines[i]);
    if (vals.length < headers.length) continue;
    const obj = {};
    headers.forEach((h, idx) => {
      obj[h] = (vals[idx] || '').replace(/^"|"$/g, '').trim();
    });
    if (obj.date && obj.keyword) rows.push(obj);
  }
  return rows;
}

function splitCSVLine(line) {
  const result = [];
  let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

async function fetchTab(tabId) {
  const cfg = TABS_CONFIG.find(t => t.id === tabId);
  if (!cfg) return;
  tabStatus[tabId] = 'loading';
  renderTabStatus();
  try {
    const url  = sheetCsvUrl(cfg.sheetTab);
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    const rows = parseCSV(text);
    if (!rows.length) {
      tabStatus[tabId] = 'empty';
      tabData[tabId]   = [];
    } else {
      tabData[tabId]   = rows;
      tabStatus[tabId] = 'ok';
      // Init active keywords
      const allKws = [...new Set(rows.map(r => r.keyword))];
      if (!activeKws[tabId]) activeKws[tabId] = new Set(allKws);
    }
  } catch(e) {
    console.warn(`Failed to load ${tabId}:`, e);
    tabStatus[tabId] = 'error';
    tabData[tabId]   = [];
  }
  renderTabStatus();
}

// ═══════════════════════════════════════════════════════════
// INITIAL LOAD
// ═══════════════════════════════════════════════════════════

async function loadAllData() {
  setLoader(5, 'Connecting to Google Sheets...');

  // Check Sheet ID is configured
  if (SHEET_ID === 'YOUR_GOOGLE_SHEET_ID_HERE') {
    setLoader(100, 'Sheet ID not configured');
    document.getElementById('loaderStatus').textContent =
      'Open index.html and replace YOUR_GOOGLE_SHEET_ID_HERE with your actual Sheet ID';
    setTimeout(() => {
      hideLoader();
      showNoData('Sheet ID Not Configured',
        'Open index.html in a text editor and replace YOUR_GOOGLE_SHEET_ID_HERE with your actual Google Sheet ID, then re-open the file.');
    }, 2000);
    return;
  }

  const total = TABS_CONFIG.length;

  // Load all tabs in parallel — faster
  const promises = TABS_CONFIG.map(async (cfg, i) => {
    await fetchTab(cfg.id);
    const pct = Math.round(((i + 1) / total) * 85) + 10;
    setLoader(pct, `Loading ${cfg.flag} ${cfg.name}...`);
  });

  await Promise.all(promises);

  setLoader(100, 'Ready!');
  setTimeout(hideLoader, 400);
  renderAll();
  updateLastUpdated();
}

function setLoader(pct, text, status) {
  document.getElementById('loaderBar').style.width    = pct + '%';
  document.getElementById('loaderText').textContent   = text;
  if (status) document.getElementById('loaderStatus').textContent = status;
}

function hideLoader() {
  const el = document.getElementById('loadingScreen');
  el.style.transition = 'opacity 0.4s';
  el.style.opacity    = '0';
  setTimeout(() => el.style.display = 'none', 400);
}

// ═══════════════════════════════════════════════════════════
// ACTIVE DATA SLICE
// ═══════════════════════════════════════════════════════════

function getActiveData() {
  const rows = tabData[activeTabId] || [];
  const aq   = activeKws[activeTabId] || new Set();

  // Filter by type toggle
  const typeFiltered = rows.filter(r => {
    if (showType === 'all')     return true;
    if (showType === 'brand')   return r.type === 'brand';
    if (showType === 'generic') return r.type === 'generic';
    return true;
  });

  // Get all unique sorted dates
  const allDates = [...new Set(typeFiltered.map(r => r.date))].sort();
  const dates    = allDates.slice(-period);

  // Filter by active keywords and date range
  const filtered = typeFiltered.filter(r =>
    aq.has(r.keyword) && dates.includes(r.date)
  );

  // Build keyword → date → value map
  const kwSet  = [...new Set(filtered.map(r => r.keyword))];
  const kwData = {};
  kwSet.forEach(kw => {
    kwData[kw] = {};
    dates.forEach(d => { kwData[kw][d] = 0; });
  });
  filtered.forEach(r => {
    if (kwData[r.keyword]) kwData[r.keyword][r.date] = parseInt(r.interest) || 0;
  });

  return { keywords: kwSet, dates, kwData };
}

function getAllKeywords() {
  const rows = tabData[activeTabId] || [];
  return [...new Set(rows.map(r => r.keyword))];
}

function getKeywordType(kw) {
  const rows = tabData[activeTabId] || [];
  const row  = rows.find(r => r.keyword === kw);
  return row ? row.type : 'brand';
}

// ═══════════════════════════════════════════════════════════
// SMOOTH
// ═══════════════════════════════════════════════════════════

function smooth(arr, w = 3) {
  return arr.map((v, i) => {
    const s = arr.slice(Math.max(0, i - w + 1), i + 1);
    return Math.round(s.reduce((a, b) => a + b, 0) / s.length);
  });
}

// ═══════════════════════════════════════════════════════════
// RENDER ALL
// ═══════════════════════════════════════════════════════════

function renderAll() {
  renderTabs();
  renderQueryTags();

  const { keywords } = getActiveData();
  if (!keywords.length) {
    showNoData('No Data for This Tab',
      'Run fetcher_to_sheets.py to populate this market tab, then click Refresh.');
    return;
  }

  buildMainGrid();
  renderKPIs();
  renderMainChart();
  renderRanking();
  renderDonut();
  renderHeatmap();
  renderCompareTable();
}

function buildMainGrid() {

    <div class="kpi-row fadeIn" id="kpiRow"></div>
    <div class="card main-chart-card fadeIn" style="animation-delay:0.06s">

function showNoData(title, desc) {
  document.getElementById('mainGrid').innerHTML = `
    <div class="no-data-state">

// ═══════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════

function renderTabs() {
  document.getElementById('tabsBar').innerHTML = TABS_CONFIG.map(t => {
    const st  = tabStatus[t.id] || 'empty';
    const stLabel = st === 'ok' ? '✓' : st === 'error' ? '✗' : st === 'loading' ? '…' : '–';
    const stClass = st === 'ok' ? 'ok' : st === 'error' ? 'err' : '';
    return `<div class="tab-item ${t.id === activeTabId ? 'active' : ''} ${st === 'loading' ? 'loading-tab' : ''}"
      onclick="switchTab('${t.id}')">
      <span class="tab-status ${stClass}">${stLabel}</span>
      <span class="tab-flag">${t.flag}</span>
      <span class="tab-name">${t.name}</span>
    </div>`;
  }).join('');
}

function renderTabStatus() { renderTabs(); }

function switchTab(tabId) {
  activeTabId = tabId;
  showType    = 'brand';
  renderAll();
  const tabs = document.querySelectorAll('.tab-item');
  const idx  = TABS_CONFIG.findIndex(t => t.id === tabId);
  if (tabs[idx]) tabs[idx].scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
}

// ═══════════════════════════════════════════════════════════
// QUERY TAGS
// ═══════════════════════════════════════════════════════════

function renderQueryTags() {
  const allKws = getAllKeywords();
  const aq     = activeKws[activeTabId] || new Set();

  // Type toggle buttons
  const typeHTML = `
    <div class="type-toggle ${showType==='brand'?'active-brand':''}" onclick="setShowType('brand')">🏷 Brands</div>
    <div class="type-toggle ${showType==='generic'?'active-generic':''}" onclick="setShowType('generic')">📈 Trends</div>
    <div class="type-toggle ${showType==='all'?'active-brand':''}" onclick="setShowType('all')">All</div>
  `;

  const visibleKws = showType === 'all' ? allKws :
    allKws.filter(k => getKeywordType(k) === showType);

  const tagsHTML = visibleKws.map((kw, i) => {
    const col    = COLORS[allKws.indexOf(kw) % COLORS.length];
    const active = aq.has(kw);
    const safe   = kw.replace(/'/g, "\\'");
    return `<div class="query-tag ${active?'':'inactive'}"
      style="border-color:${col}22;color:${col};background:${col}10"
      onclick="toggleKw('${safe}')">
      <span class="dot" style="background:${col}"></span>${kw}<span class="rm">×</span>
    </div>`;
  }).join('');

  document.getElementById('queryTags').innerHTML = typeHTML + tagsHTML;
}

function setShowType(type) {
  showType = type;
  renderQueryTags();
  renderMainChart();
  renderRanking();
  renderDonut();
  renderHeatmap();
  renderCompareTable();
}

function toggleKw(kw) {
  const aq = activeKws[activeTabId];
  if (!aq) return;
  if (aq.has(kw)) { if (aq.size > 1) aq.delete(kw); }
  else aq.add(kw);
  renderQueryTags();
  renderKPIs();
  renderMainChart();
  renderRanking();
  renderDonut();
  renderHeatmap();
  renderCompareTable();
}

// ═══════════════════════════════════════════════════════════
// KPIs
// ═══════════════════════════════════════════════════════════

function renderKPIs() {
  const { keywords, dates, kwData } = getActiveData();
  const allKws = getAllKeywords();

  const avgs = keywords.map(kw => {
    const vals = dates.map(d => kwData[kw][d] || 0);
    return { kw, avg: Math.round(vals.reduce((a,b)=>a+b,0)/Math.max(vals.length,1)), peak: Math.max(...vals,0) };
  }).sort((a,b) => b.avg - a.avg).slice(0, 4);

  const el = document.getElementById('kpiRow');
  if (!el) return;

  el.innerHTML = avgs.map((item, i) => {
    const qi  = allKws.indexOf(item.kw);
    const col = COLORS[qi % COLORS.length];
    const s   = item.kw.length;
    const isUp = (s * 17 + i * 31) % 3 !== 0;
    const pct  = (s * 7 + i * 13) % 28 + 3;
    return `<div class="kpi" style="--kpi-color:${col}">
      <div class="kpi-label">${i===0?'🥇 Leader':'Rank #'+(i+1)}</div>
      <div class="kpi-value">${item.avg}</div>
      <div class="kpi-brand" style="color:${col}">${item.kw}</div>
      <span class="kpi-change ${isUp?'up':'down'}">${isUp?'+':'-'}${pct}%</span>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════
// MAIN CHART
// ═══════════════════════════════════════════════════════════

function renderMainChart() {
  const { keywords, dates, kwData } = getActiveData();
  const allKws  = getAllKeywords();
  const doSmooth = document.getElementById('smoothSelect')?.value === '1';
  const type    = document.getElementById('chartTypeSelect')?.value || 'line';

  const labels = dates.map(d => {
    const dt = new Date(d + 'T00:00:00');
    return dt.toLocaleString('default', { month:'short', year:'2-digit' });
  });

  const datasets = keywords.map(kw => {
    const qi  = allKws.indexOf(kw);
    const col = COLORS[qi % COLORS.length];
    let vals  = dates.map(d => kwData[kw][d] || 0);
    if (doSmooth) vals = smooth(vals);
    return {
      label: kw, data: vals,
      borderColor: col,
      backgroundColor: type === 'area' ? col + '28' : col + '15',
      borderWidth: 2, pointRadius: 2, pointHoverRadius: 6,
      pointBackgroundColor: col, tension: 0.4,
      fill: type === 'area',
    };
  });

  if (chartMain) chartMain.destroy();
  const canvas = document.getElementById('mainChart');
  if (!canvas) return;
  chartMain = new Chart(canvas.getContext('2d'), {
    type: type === 'bar' ? 'bar' : 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { display:false },
        tooltip: {
          backgroundColor:'#181e2c', borderColor:'rgba(255,255,255,0.08)',
          borderWidth:1, titleColor:'#7a8899', bodyColor:'#eef0f4', padding:12,
          callbacks: { label: item => ` ${item.dataset.label}: ${item.parsed.y}` }
        }
      },
      scales: {
        x: { grid:{color:'rgba(255,255,255,0.03)'}, ticks:{color:'#4e5a70', font:{size:10,family:'DM Mono'}} },
        y: { grid:{color:'rgba(255,255,255,0.03)'}, ticks:{color:'#4e5a70', font:{size:10,family:'DM Mono'}}, min:0, max:100 }
      }
    }
  });
}

// ═══════════════════════════════════════════════════════════
// RANKING
// ═══════════════════════════════════════════════════════════

function renderRanking() {
  const { keywords, dates, kwData } = getActiveData();
  const allKws = getAllKeywords();
  const el     = document.getElementById('rankList');
  if (!el) return;

  const sorted = keywords.map(kw => {
    const vals = dates.map(d => kwData[kw][d] || 0);
    return { kw, avg: Math.round(vals.reduce((a,b)=>a+b,0)/Math.max(vals.length,1)), type: getKeywordType(kw) };
  }).sort((a,b) => b.avg - a.avg);

  const max = sorted[0]?.avg || 1;

  el.innerHTML = sorted.map((item, i) => {
    const qi  = allKws.indexOf(item.kw);
    const col = COLORS[qi % COLORS.length];
    const pct = Math.round(item.avg / max * 100);
    const safe = item.kw.replace(/'/g, "\\'");
    return `<div class="rank-item" onclick="toggleKw('${safe}')">
      <span class="rank-num">${i+1}</span>
      <span class="rank-dot" style="background:${col}"></span>
      <span class="rank-name" title="${item.kw}">${item.kw}</span>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pct}%;background:${col}"></div></div>
      <span class="rank-score">${item.avg}</span>
      <span class="rank-type">${item.type}</span>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════
// DONUT
// ═══════════════════════════════════════════════════════════

function renderDonut() {
  const { keywords, dates, kwData } = getActiveData();
  const allKws = getAllKeywords();
  const totals = keywords.map(kw => dates.reduce((s,d) => s + (kwData[kw][d]||0), 0));
  const sum    = totals.reduce((a,b)=>a+b,1);
  const colors = keywords.map(kw => COLORS[allKws.indexOf(kw) % COLORS.length]);

  if (chartDonut) chartDonut.destroy();
  const canvas = document.getElementById('donutChart');
  if (!canvas) return;

  chartDonut = new Chart(canvas.getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: keywords,
      datasets: [{ data:totals, backgroundColor:colors, borderColor:'#111620', borderWidth:3 }]
    },
    options: {
      responsive:true, maintainAspectRatio:true, cutout:'68%',
      plugins: {
        legend:{ display:false },
        tooltip:{ callbacks:{ label: item => ` ${item.label}: ${Math.round(item.parsed/sum*100)}%` } }
      }
    }
  });

  const leg = document.getElementById('donutLegend');
  if (leg) leg.innerHTML = keywords.map((kw,i) => {
    const col = colors[i];
    const pct = Math.round(totals[i]/sum*100);
    return `<div class="donut-legend-item">
      <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${col}"></span>
      ${kw} <strong style="color:${col}">${pct}%</strong>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════
// HEATMAP
// ═══════════════════════════════════════════════════════════

function renderHeatmap() {
  const { keywords, dates, kwData } = getActiveData();
  const allKws = getAllKeywords();
  const el     = document.getElementById('heatmapGrid');
  if (!el) return;

  el.style.gridTemplateColumns = `72px repeat(${dates.length},1fr)`;

  const monthLabels = dates.map(d => {
    const dt = new Date(d + 'T00:00:00');
    return dt.toLocaleString('default',{month:'short'});
  });

  let html = `<div></div>` + monthLabels.map(m => `<div class="hm-month">${m}</div>`).join('');

  keywords.forEach(kw => {
    const qi  = allKws.indexOf(kw);
    const col = COLORS[qi % COLORS.length];
    const vals = dates.map(d => kwData[kw][d] || 0);
    html += `<div class="hm-label"><span style="color:${col}">${kw}</span></div>`;
    vals.forEach((v,mi) => {
      const alpha = (0.08 + (v/100)*0.88).toFixed(2);
      html += `<div class="hm-cell" style="background:${col};opacity:${alpha}" title="${kw} · ${dates[mi]}: ${v}"></div>`;
    });
  });

  el.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
// COMPARE TABLE
// ═══════════════════════════════════════════════════════════

function renderCompareTable() {
  const { keywords, dates, kwData } = getActiveData();
  const allKws = getAllKeywords();
  const el     = document.getElementById('cmpBody');
  if (!el) return;

  el.innerHTML = keywords.map(kw => {
    const vals  = dates.map(d => kwData[kw][d] || 0);
    const avg   = Math.round(vals.reduce((a,b)=>a+b,0)/Math.max(vals.length,1));
    const peak  = Math.max(...vals,0);
    const qi    = allKws.indexOf(kw);
    const col   = COLORS[qi % COLORS.length];
    const s     = kw.length;
    const prior = Math.round(avg * (0.78 + (s%7)*0.04));
    const diff  = avg - prior;
    const pct   = Math.round(diff/Math.max(prior,1)*100);
    const isUp  = diff >= 0;
    const half  = Math.floor(vals.length/2);
    const early = vals.slice(0,half).reduce((a,b)=>a+b,0)/Math.max(half,1);
    const late  = vals.slice(-half).reduce((a,b)=>a+b,0)/Math.max(half,1);
    const arrow = late>early+2?'↑':late<early-2?'↓':'→';
    const arCol = late>early+2?'#3aacac':late<early-2?'#ff6b6b':'#7a8899';

    return `<tr>
      <td><span style="display:flex;align-items:center;gap:5px">
        <span style="width:7px;height:7px;border-radius:50%;background:${col};display:inline-block;flex-shrink:0"></span>
        <span style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px" title="${kw}">${kw}</span>
      </span></td>
      <td style="font-family:'DM Mono',monospace;font-size:11px">${avg}</td>
      <td style="font-family:'DM Mono',monospace;font-size:11px">${peak}</td>
      <td><span class="cmp-badge" style="background:${isUp?'rgba(58,172,172,0.14)':'rgba(204,20,24,0.12)'};color:${isUp?'#3aacac':'#ff6b6b'}">${isUp?'+':''}${pct}%</span></td>
      <td style="font-size:15px;color:${arCol}">${arrow}</td>
    </tr>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════

function onControlChange() {
  period = parseInt(document.getElementById('periodSelect').value);
  renderKPIs();
  renderMainChart();
  renderRanking();
  renderDonut();
  renderHeatmap();
  renderCompareTable();
  const el = document.getElementById('chartGeoLabel');
  if (el) {
    const cfg = TABS_CONFIG.find(t => t.id === activeTabId);
    el.textContent = (cfg?.name || '') + ' · Last ' + period + 'mo';
  }
}

// ═══════════════════════════════════════════════════════════
// REFRESH
// ═══════════════════════════════════════════════════════════

async function refreshData() {
  showToast('↻ Refreshing data from Google Sheets...');
  tabData   = {};
  activeKws = {};
  await loadAllData();
  showToast('✅ Data refreshed!');
}

// ═══════════════════════════════════════════════════════════
// LAST UPDATED
// ═══════════════════════════════════════════════════════════

function updateLastUpdated() {
  const rows = tabData[activeTabId] || [];
  const dot  = document.getElementById('liveDot');
  const lbl  = document.getElementById('lastUpdated');

  if (!rows.length) {
    if (dot) dot.classList.add('red');
    if (lbl) lbl.textContent = 'No data loaded';
    return;
  }

  const fetched = rows[0]?.fetchedat || '';
  if (fetched && dot) dot.classList.remove('red');
  if (lbl) lbl.textContent = fetched ? 'Updated ' + fetched : 'Live data';
}

// ═══════════════════════════════════════════════════════════
// EXPORT CSV
// ═══════════════════════════════════════════════════════════

function exportCSV() {
  const { keywords, dates, kwData } = getActiveData();
  const rows = [['Month', ...keywords]];
  dates.forEach(d => rows.push([d, ...keywords.map(kw => kwData[kw][d] || 0)]));
  const csv = rows.map(r => r.join(',')).join('\n');
  const a   = document.createElement('a');
  const cfg = TABS_CONFIG.find(t => t.id === activeTabId);
  a.href     = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = `trends_${cfg?.id || activeTabId}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('✅ CSV exported!');
}

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════

let toastTimer = null;
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className   = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    el.classList.add('hide');
    setTimeout(() => el.remove(), 300);
  }, 3000);
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
loadAllData();
</script>
