name: Weekly Trends Refresh

on:
  schedule:
    - cron: "0 7 * * 1"   # Every Monday 7:00 AM UTC
  workflow_dispatch:        # Also allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write credentials.json from secret
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Inject Sheet ID into script
        run: |
          sed -i 's/YOUR_GOOGLE_SHEET_ID_HERE/${{ secrets.GOOGLE_SHEET_ID }}/' fetcher_to_sheets.py

      - name: Run fetcher
        run: python fetcher_to_sheets.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Done
        if: success()
        run: echo "✅ Trends refreshed at $(date -u)"
